<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arus Offline</title>
    <meta name="theme-color" content="#171717">
    <style>
        :root {
            color-scheme: light;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #fafafa;
            color: #18181b;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            box-sizing: border-box;
        }

        .card {
            width: 100%;
            max-width: 24rem;
            background: #ffffff;
            border: 1px solid #d4d4d8;
            border-radius: 1.5rem;
            padding: 1.25rem;
            box-shadow: 0 10px 30px rgba(24, 24, 27, 0.06);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.7rem;
            border-radius: 999px;
            background: #d9f99d;
            color: #18181b;
            font-size: 0.875rem;
            font-weight: 600;
        }

        h1 {
            margin: 1rem 0 0.35rem;
            font-size: 1.5rem;
            line-height: 1.15;
        }

        p {
            margin: 0;
            color: #52525b;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <section class="card">
        <div class="badge">Arus Offline</div>
        <h1>Koneksi sedang tidak tersedia.</h1>
        <p>Arus tetap bisa dibuka sebagai aplikasi, tetapi halaman ini butuh koneksi untuk memuat data terbaru. Coba lagi saat internet kembali stabil.</p>
    </section>
</body>
</html>
